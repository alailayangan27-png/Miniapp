<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Market</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body {
    background: #0f172a;
    color: white;
    font-family: sans-serif;
    padding: 10px;
}

.card {
    background: #1e293b;
    padding: 15px;
    margin-bottom: 10px;
    border-radius: 12px;
}

button {
    width: 100%;
    padding: 12px;
    border-radius: 8px;
    border: none;
    background: #22c55e;
    color: white;
    font-size: 16px;
}
</style>
</head>

<body>

<h2>🚀 Username Market</h2>

<div class="card">
    <h3>@tempomart</h3>
    <p>💰 0.01 TON</p>
    <button onclick="buy('tempomart')">Buy</button>
</div>

<div class="card">
    <h3>@positor</h3>
    <p>💰 0.02 TON</p>
    <button onclick="buy('positor')">Buy</button>
</div>

<script>
let tg = window.Telegram.WebApp;
tg.expand();

function buy(username) {
    tg.sendData("buy_" + username);
}
</script>

</body>
</html>
